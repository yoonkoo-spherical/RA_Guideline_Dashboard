name: Daily Guideline Scraper

on:
  schedule:
    # KST 기준 매일 05:00 실행 (UTC 기준 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 불러오기 (Checkout repo)
        uses: actions/checkout@v4 # v3에서 v4로 업데이트 (Node.js 버전 경고 해결)

      - name: 파이썬 환경 설정 (Set up Python)
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트 (Node.js 버전 경고 해결)
        with:
          python-version: '3.10'

      - name: 필요 패키지 설치 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 크롤링 스크립트 실행 (Run scraper)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python scraper.py
