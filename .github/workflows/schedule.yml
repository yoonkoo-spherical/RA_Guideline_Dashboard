name: Daily Guideline Scraper

on:
  schedule:
    - cron: '0 15 * * *' # KST 기준 매일 00:00
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 불러오기 (Checkout repo)
        uses: actions/checkout@v4

      - name: 시스템 의존성 패키지 설치 (OCR 및 PDF 처리용)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-kor poppler-utils

      - name: 파이썬 환경 설정 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요 패키지 설치 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 크롤링 스크립트 실행 (Run scraper)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python scraper.py
