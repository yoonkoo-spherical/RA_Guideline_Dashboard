name: Daily Document Embedder

on:
  schedule:
    # KST 기준 매일 06:00 실행 (UTC 기준 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # Actions 탭에서 수동으로 실행할 수 있게 해주는 옵션

jobs:
  embed-and-store:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 불러오기 (Checkout repo)
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요 패키지 설치 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 임베딩 스크립트 실행 (Run embedder)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python embedder.py
