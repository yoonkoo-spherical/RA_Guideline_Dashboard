name: Daily Document Analyzer

on:
  schedule:
    - cron: '30 20 * * *' # 매일 스크래퍼 실행 이후 시점에 가동
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  analyze-and-summary:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 시스템 의존성 패키지 설치 (OCR 및 PDF 처리용)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-kor poppler-utils

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 파이썬 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # 기존의 직접 나열 방식 대신 requirements.txt를 사용하도록 수정
          pip install -r requirements.txt

      - name: 요약 및 분석 스크립트 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python analyzer.py
